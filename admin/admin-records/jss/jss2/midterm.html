<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSS 2 — Mid-Term Test Record | Admin | Go-Tegs</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/assets/js/records-common.js"></script>
  <link rel="stylesheet" href="/assets/css/admin-records.css" />
  <script>
    guardRecordsAuth();
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const students = await fetchClassStudents("jss_students", "JSS 2");
        document.getElementById("tablesContainer").innerHTML = students.length
          ? renderMidtermTable(students, "jss_students")
          : "<p>No students found for this class.</p>";
      } catch (err) {
        document.getElementById("tablesContainer").innerHTML = "Error: " + err.message;
      }
      document.getElementById("downloadBtn")?.addEventListener("click", () => downloadLedgerPDF("captureArea", "GoTegs_JSS2_MidTerm.pdf"));
    });
  </script>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="page-container admin-page" style="max-width: 1100px;">
    <nav class="breadcrumb">Admin / Records / JSS / JSS 2 / Mid-Term</nav>
    <h1>JSS 2 — Mid-Term Test Record</h1>
    
    <div class="table-responsive-wrapper" style="margin-top:1.5rem; overflow-x:auto;">
      <div id="captureArea" style="background:#fff; padding:15px; min-width:900px;">
        <div style="display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid var(--teal); padding-bottom:10px;">
          <img src="/assets/img/logo.png" style="width:60px; border-radius:6px;" alt="Logo" />
          <div style="text-align:center;">
            <h2 style="margin:0; color:var(--teal-dark); font-family:var(--font-display);">Go-Tegs International School</h2>
            <p style="margin:2px 0; font-weight:600; text-transform:uppercase; font-size:12px; color:var(--slate);">JSS 2 — Mid-Term Test Record</p>
          </div>
        </div>
        <div id="tablesContainer" style="margin-top:1rem;">Loading...</div>
      </div>
    </div>
    <div style="text-align:center; padding:1.5rem 0;">
      <button class="btn" id="downloadBtn">Download PDF</button>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/assets/js/main.js"></script>
</body>
</html>
