<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academy Portal | Secure Login</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="icon" href="data:,">
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">🎓</span> Academy<span class="highlight">Portal</span>
      </a>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="login.html" class="btn btn-secondary active">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </nav>
      <button class="hamburger" aria-label="Toggle Menu System" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="side-drawer">
    <nav class="drawer-menu">
      <a href="index.html" class="drawer-link">Home</a>
      <a href="about.html" class="drawer-link">About Us</a>
      <hr class="drawer-divider">
      <a href="login.html" class="btn btn-secondary btn-block">Login Portal</a>
      <a href="signup.html" class="btn btn-primary btn-block">Create Account</a>
    </nav>
  </div>
  <div class="drawer-overlay"></div>

  <main class="auth-wrapper">
    <div class="glass-card auth-card animated-view-change">
      <div class="auth-header">
        <h2>Secure Gateway Portal</h2>
        <p>Provide verified electronic mail credentials to access dashboard records.</p>
      </div>

      <form id="login-form" novalidate>
        
        <div class="form-group">
          <label for="login-email" class="form-label">Account Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="student@school.edu" required>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Security Key Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="form-utility-row">
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <input type="checkbox" id="login-remember" style="width: 14px; height: 14px; cursor: pointer;">
            <label for="login-remember" style="color: var(--text-muted); cursor: pointer; user-select: none;">Remember me</label>
          </div>
          <a href="forgot-password.html" class="link-blue-underlined">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-large">
          Secure Login
        </button>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign up</a>
        </div>

      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/ui.js"></script>
</body>
</html>
