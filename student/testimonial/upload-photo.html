<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Passport Photo | Go-Tegs International School</title>
  <link rel="stylesheet" href="/assets/css/report.css" />
  <style>
    body { justify-content: center; }
    .upload-card {
      width: 100%; max-width: 460px; background: #fff; border-radius: 14px;
      border: 1px solid #e3ece9; padding: 2rem 1.75rem; text-align: center;
    }
    .upload-card h2 { font-family: 'Sora', sans-serif; color: var(--teal-dark); margin-bottom: 0.4rem; }
    .upload-card p { color: var(--slate); font-size: 0.9rem; margin-bottom: 1.4rem; }

    .photo-drop {
      width: 140px; height: 170px; margin: 0 auto 1.2rem; border-radius: 8px;
      border: 2px dashed #b9d9d6; display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: var(--teal-light); color: var(--teal-dark); font-size: 0.8rem;
      cursor: pointer;
    }
    .photo-drop img { width: 100%; height: 100%; object-fit: cover; }

    #fileInput { display: none; }

    #uploadMsg { font-size: 0.85rem; font-weight: 600; margin-top: 0.6rem; min-height: 1.2rem; }

    .loading-state { display: none; text-align: center; }
    .spinner {
      width: 42px; height: 42px; border: 4px solid var(--teal-light);
      border-top-color: var(--teal); border-radius: 50%; margin: 0 auto 1rem;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="upload-card">
    <div id="formState">
      <h2>Almost there</h2>
      <p>Upload a clear passport photograph to appear on your testimonial.<br />JPG or PNG, under 500KB.</p>

      <label class="photo-drop" id="photoDrop">
        <span id="dropLabel">Click to choose photo</span>
        <input type="file" id="fileInput" accept="image/jpeg,image/png" />
      </label>

      <p id="uploadMsg"></p>
      <button class="btn" id="continueBtn" style="width:100%;">Generate My Testimonial</button>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p style="color:var(--teal-dark); font-weight:600;">Preparing your testimonial...</p>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('gotegs_testimonial_data')) {
      window.location.href = '/student/testimonial/index.html';
    }

    const fileInput = document.getElementById('fileInput');
    const photoDrop = document.getElementById('photoDrop');
    const dropLabel = document.getElementById('dropLabel');
    const uploadMsg = document.getElementById('uploadMsg');
    let photoDataUrl = null;

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      uploadMsg.textContent = '';

      if (!file) return;

      if (!['image/jpeg', 'image/png'].includes(file.type)) {
        uploadMsg.style.color = '#dc2626';
        uploadMsg.textContent = 'Please choose a JPG or PNG image.';
        fileInput.value = '';
        return;
      }

      if (file.size > 500 * 1024) {
        uploadMsg.style.color = '#dc2626';
        uploadMsg.textContent = 'File is too large. Please choose one under 500KB.';
        fileInput.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        photoDataUrl = e.target.result;
        photoDrop.innerHTML = `<img src="${photoDataUrl}" alt="Passport photo preview" />`;
        photoDrop.appendChild(fileInput);
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('continueBtn').addEventListener('click', () => {
      if (!photoDataUrl) {
        uploadMsg.style.color = '#dc2626';
        uploadMsg.textContent = 'Please upload a passport photo first.';
        return;
      }

      sessionStorage.setItem('gotegs_testimonial_photo', photoDataUrl);

      document.getElementById('formState').style.display = 'none';
      document.getElementById('loadingState').style.display = 'block';

      setTimeout(() => {
        window.location.href = '/student/testimonial/view.html';
      }, 3000);
    });
  </script>
</body>
</html>
