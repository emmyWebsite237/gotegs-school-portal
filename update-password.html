<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academy Portal | Update Security Credentials</title>
  <!-- Link to the Shared Master Stylesheet -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- ==========================================
       1. GLOBAL NAVIGATION BAR
       ========================================== -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">🎓</span> Academy<span class="highlight">Portal</span>
      </a>
      
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="login.html" class="btn btn-secondary">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </nav>

      <button class="hamburger" aria-label="Toggle Menu System" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Mobile Side Drawer Navigation Menu -->
  <div class="side-drawer">
    <nav class="drawer-menu">
      <a href="index.html" class="drawer-link">Home</a>
      <a href="about.html" class="drawer-link">About Us</a>
      <hr class="drawer-divider">
      <a href="login.html" class="btn btn-secondary btn-block">Login Portal</a>
      <a href="signup.html" class="btn btn-primary btn-block">Create Account</a>
    </nav>
  </div>
  <div class="drawer-overlay"></div>

  <!-- ==========================================
       2. RECONSTRUCTED UPDATE PASSWORD CARD
       ========================================== -->
  <main class="auth-wrapper">
    <div class="glass-card auth-card animated-view-change">
      
      <!-- Card Branding Header -->
      <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Your identity has been verified. Please establish a new secure password for your account portal.</p>
      </div>

      <!-- Password Modification Submission Form -->
      <form id="update-password-form" novalidate>
        
        <!-- Field 1: New Password Target Input -->
        <div class="form-group">
          <label for="update-password" class="form-label">New Password</label>
          <input type="password" id="update-password" class="form-control" placeholder="••••••••" minlength="6" required>
        </div>

        <!-- Field 2: Matching Confirmation Target Input -->
        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="update-confirm" class="form-label">Confirm New Password</label>
          <input type="password" id="update-confirm" class="form-control" placeholder="••••••••" required>
        </div>

        <!-- Apply Database Security Modification Commit Button -->
        <button type="submit" class="btn btn-primary btn-block btn-large">
          Update Password
        </button>

      </form>
    </div>
  </main>

  <!-- ==========================================
       3. MODULAR SCRIPT PROCESSING
       ========================================= -->
  <!-- Supabase Core Driver Module Script CDN integration layer -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- App Configuration & UI Responsive Controller engines -->
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
</body>
</html>
