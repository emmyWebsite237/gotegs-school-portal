<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academy Portal | Create Account</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="icon" href="data:,">
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">🎓</span> Academy<span class="highlight">Portal</span>
      </a>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="login.html" class="btn btn-secondary">Login</a>
        <a href="signup.html" class="btn btn-primary active">Sign Up</a>
      </nav>
      <button class="hamburger" aria-label="Toggle Menu System" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="side-drawer">
    <nav class="drawer-menu">
      <a href="index.html" class="drawer-link">Home</a>
      <a href="about.html" class="drawer-link">About Us</a>
      <hr class="drawer-divider">
      <a href="login.html" class="btn btn-secondary btn-block">Login Portal</a>
      <a href="signup.html" class="btn btn-primary btn-block">Create Account</a>
    </nav>
  </div>
  <div class="drawer-overlay"></div>

  <main class="auth-wrapper">
    <div class="glass-card auth-card animated-view-change">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join the academy portal system network platform.</p>
      </div>

      <form id="signup-form" novalidate>
        
        <div class="form-group">
          <label for="reg-fullname" class="form-label">Full Name</label>
          <input type="text" id="reg-fullname" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="reg-email" class="form-label">Email Address</label>
          <input type="email" id="reg-email" class="form-control" placeholder="yourname@school.edu" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-phone" class="form-label">Phone Number</label>
            <input type="tel" id="reg-phone" class="form-control" placeholder="+234..." required>
          </div>
          <div class="form-group">
            <label for="reg-role" class="form-label">Portal Account Role</label>
            <select id="reg-role" class="form-control" required>
              <option value="" disabled selected>Select Role</option>
              <option value="student">Student Profile</option>
              <option value="parent">Parent/Guardian</option>
              <option value="instructor">Academic Instructor</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-password" class="form-label">Secure Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="••••••••" minlength="6" required>
          </div>
          <div class="form-group">
            <label for="reg-confirm" class="form-label">Confirm Password</label>
            <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <div class="checkbox-group" style="display: flex; gap: 0.75rem; margin-top: 1rem; margin-bottom: 1.5rem; text-align: left;">
          <input type="checkbox" id="reg-consent" required style="width: 16px; height: 16px; margin-top: 3px; cursor: pointer;">
          <label for="reg-consent" class="checkbox-label" style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; user-select: none; cursor: pointer;">
            I explicitly agree to receive official school information transcripts, academic notification messages, and platform updates from the website admin router.
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-large">
          Register Account
        </button>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Login</a>
        </div>

      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/ui.js"></script>
</body>
</html>
