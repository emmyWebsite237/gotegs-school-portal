<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academy Portal | Reset Password Request</title>
  <!-- Link to the Shared Master Stylesheet -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- ==========================================
       1. GLOBAL NAVIGATION BAR
       ========================================== -->
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">🎓</span> Academy<span class="highlight">Portal</span>
      </a>
      
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="login.html" class="btn btn-secondary">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </nav>

      <button class="hamburger" aria-label="Toggle Menu System" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Mobile Side Drawer Navigation Menu -->
  <div class="side-drawer">
    <nav class="drawer-menu">
      <a href="index.html" class="drawer-link">Home</a>
      <a href="about.html" class="drawer-link">About Us</a>
      <hr class="drawer-divider">
      <a href="login.html" class="btn btn-secondary btn-block">Login Portal</a>
      <a href="signup.html" class="btn btn-primary btn-block">Create Account</a>
    </nav>
  </div>
  <div class="drawer-overlay"></div>

  <!-- ==========================================
       2. RECONSTRUCTED FORGOT PASSWORD CARD
       ========================================== -->
  <main class="auth-wrapper">
    <div class="glass-card auth-card animated-view-change">
      
      <!-- Card Branding Header -->
      <div class="auth-header">
        <h2>Recover Account</h2>
        <p>Enter your registered account credentials to receive a secure recovery verification connection link.</p>
      </div>

      <!-- Password Recovery Request Submission Layout Form -->
      <form id="forgot-password-form" novalidate>
        
        <!-- Field 1: Security Target Identity Email Box -->
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="recovery-email" class="form-label">Account Email Address</label>
          <input type="email" id="recovery-email" class="form-control" placeholder="student@school.edu" required>
        </div>

        <!-- Request Submission Dispatch Button -->
        <button type="submit" class="btn btn-primary btn-block btn-large">
          Send Recovery Link
        </button>

        <!-- Redirect Switching Navigation Core Links -->
        <div class="auth-footer">
          Remembered your access security credentials? <a href="login.html">Back to Login</a>
        </div>

      </form>
    </div>
  </main>

  <!-- ==========================================
       3. MODULAR SCRIPT PROCESSING
       ========================================== -->
  <!-- Supabase Core Driver Module Script CDN integration layer -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- App Configuration & UI Responsive Controller engines -->
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
</body>
</html>
